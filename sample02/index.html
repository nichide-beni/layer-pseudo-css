<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPEED RIDE | サイクリングライフ</title>
  <!-- メインCSSのみを読み込みます -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header__inner">
      <h1 class="logo">SPEED RIDE</h1>
      <nav class="nav">
        <a href="#" class="nav__link">Home</a>
        <a href="#" class="nav__link">Bikes</a>
        <a href="#" class="nav__link">Routes</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- ヒーローセクション -->
    <section class="hero">
      <div class="hero__content">
        <h2 class="hero__title">風を感じて、どこまでも。</h2>
        <p class="hero__text">誰も見たことのない世界を見に行こう！</p>
        <a href="#" class="btn btn-primary">旅のルートを探す。</a>
      </div>
    </section>

    <!-- 特徴セクション（外部ライブラリ風スタイルが適用される場所） -->
    <section class="features">
      <div class="features__inner">
        <div class="card">
          <div class="card__icon">🚴‍♂️</div>
          <h3 class="card__title">バイクレンタル</h3>
          <p class="card__text">最新のバイクも多数完備！最高峰のグラベルバイクとロードバイクのレンタル。</p>
        </div>
        <div class="card">
          <div class="card__icon">🗺️</div>
          <h3 class="card__title">トラベルロード</h3>
          <p class="card__text">初心者向けからヒルクライムまで網羅した最高のコースをご提案。</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 WIND RIDE. All rights reserved.</p>
  </footer>

</body>
</html>
